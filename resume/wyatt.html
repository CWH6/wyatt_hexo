  .page {

    position: absolute; top: 16px; left: 16px;

    margin-bottom: 28px; padding-bottom: 22px;

  .header h1 { font-size: 26px; font-weight: 600; color: #f0f6fc; letter-spacing: 2px; }
  .header .sub { font-size: 14px; color: var(--accent); margin-top: 4px; font-weight: 500; font-family: 'SF Mono','Fira Code','Consolas',monospace; }

    padding: 3px; background: linear-gradient(135deg, var(--accent), var(--purple));
    border-radius: 5px;

  .avatar-wrap .avatar {

  .avatar-wrap::after {
    content: '🔍'; position: absolute; bottom: 4px; right: 4px;
    font-size: 10px; opacity: .7; pointer-events: none;
  }

  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 999;

  .pj-detail li::before { content: '▸'; color: var(--accent); margin-right: 6px; font-size: 10px; }

</style>

  h.push('<div class="left-col">');
  if (data.photo) h.push('<div class="avatar-wrap" onclick="document.getElementById(\'lb\').classList.add(\'show\')"><img class="avatar" src="'+esc(data.photo)+'" alt="photo"></div>');
  h.push('<div><h1>'+esc(data.name)+'</h1><div class="sub">'+esc(data.title)+'</div></div>');
  h.push('</div>');
  h.push('<div class="info">');
  h.push('<div>'+esc(data.gender)+' · '+esc(data.age)+'岁 · '+esc(data.experience)+'经验</div>');
  h.push('<div>'+esc(data.phone)+'</div><div>'+esc(data.email)+'</div>');
  if (data.github) h.push('<div><a href="'+esc(data.github)+'" target="_blank">'+esc(data.github)+'</a></div>');
  if (data.blog) h.push('<div><a href="'+esc(data.blog)+'" target="_blank">'+esc(data.blog)+'</a></div>');
  h.push('</div></div>');
  // Lightbox
  if (data.photo) h.push('<div class="lightbox" id="lb" onclick="this.classList.remove(\'show\')"><img src="'+esc(data.photo)+'"></div>');

  // 求职意向
  sec(h, '求职意向', function() {
    var i = data.intention;
    h.push('<div class="intention">');
    h.push('<span><span class="label">意向岗位：</span>'+esc(i.post)+'</span>');
    h.push('<span><span class="label">意向城市：</span>'+esc(i.city)+'</span>');
    h.push('<span><span class="label">期望薪资：</span>'+esc(i.salary)+'</span>');
    h.push('</div>');
  });

  // 技能
  sec(h, '专业技能', function() {
    var skills = data.skills;
    for (var cat in skills) {
      var tags = skills[cat].split(/\s+/);
      h.push('<div class="skill-cat"><div class="cat-name">'+esc(cat)+'</div><div class="tags">');
      for (var t = 0; t < tags.length; t++) {
        h.push('<span class="tag">'+esc(tags[t])+'</span>');
      }
      h.push('</div></div>');
    }
  });

  // 工作经历
  sec(h, '工作经历', function() {
    var jobs = data.jobs;
    for (var i = 0; i < jobs.length; i++) {
      var j = jobs[i];
      h.push('<div class="tl">');
      h.push('<div class="tl-hd"><span class="l">'+esc(j.company)+'</span><span class="r">'+esc(j.period)+'</span></div>');
      h.push('<div class="tl-sub">'+esc(j.industry)+' · '+esc(j.role)+'</div>');
      h.push('<ul class="tl-detail">');
      for (var k = 0; k < j.items.length; k++) {
        h.push('<li>'+j.items[k]+'</li>');
      }
      h.push('</ul></div>');
    }
  });

  // 项目经验
  sec(h, '项目经验', function() {
    var pjs = data.projects;
    for (var i = 0; i < pjs.length; i++) {
      var p = pjs[i];
      h.push('<div class="pj">');
      h.push('<div class="pj-hd"><span class="n">'+esc(p.name)+'</span><span class="d">'+esc(p.period)+'</span></div>');
      h.push('<div class="pj-desc">'+esc(p.desc)+'</div>');
      h.push('<ul class="pj-detail">');
      for (var k = 0; k < p.items.length; k++) {
        h.push('<li>'+p.items[k]+'</li>');
      }
      h.push('</ul></div>');
    }
  });

  // 自我评价
  sec(h, '自我评价', function() {
    h.push('<ul class="eval">');
    var ev = data.selfEval;
    for (var i = 0; i < ev.length; i++) {
      h.push('<li>'+ev[i]+'</li>'); // 允许内嵌 <strong>
    }
    h.push('</ul>');
  });

  // 教育 & 荣誉
  sec(h, '教育经历', function() {
    var e = data.education;
    h.push('<div class="edu-row">');
    h.push('<span class="school">'+esc(e.school)+' · '+esc(e.major)+'</span>');
    h.push('<span class="date">'+esc(e.period)+'</span>');
    h.push('</div>');
    h.push('<div class="edu-detail">主修课程：'+esc(e.courses)+'</div>');
  });

  sec(h, '荣誉证书', function() {
    h.push('<div>'+esc(data.honors)+'</div>');
  });

  // Footer
  h.push('<div class="footer">'+esc(data.footer)+'</div>');

  page.innerHTML = h.join('');

  function sec(buf, title, fn) {
    buf.push('<div class="section"><div class="section-title"><span class="dot">$</span> '+esc(title)+'</div>');
    fn();
    buf.push('</div>');
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
})(resume);
</script>
</body>
</html>
