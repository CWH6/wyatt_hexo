<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>证书 - 陈为汇</title>
<style>
  :root {
    --bg0: #0d1117;
    --bg1: #161b22;
    --bg2: #21262d;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d2991d;
    --red: #f85149;
    --purple: #a371f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: var(--text);
    background: linear-gradient(135deg, #090c10 0%, #0d1520 50%, #0a0f16 100%);
    font-size: 14px;
    line-height: 1.7;
    min-height: 100vh;
  }
  .page {
    max-width: 900px; margin: 36px auto;
    padding: 48px 56px 44px;
  }

  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    position: fixed; top: 16px; left: 16px; z-index: 10;
    color: var(--muted); text-decoration: none;
    font-size: 13px; font-family: 'SF Mono','Fira Code','Consolas',monospace;
    padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px;
    transition: all .2s; background: var(--bg0);
  }
  .back-btn:hover { color: var(--accent); border-color: var(--accent); }

  .page-title {
    font-size: 28px; font-weight: 700; color: #f0f6fc; letter-spacing: 2px;
    margin-bottom: 8px; text-align: center;
  }
  .page-sub {
    text-align: center; color: var(--muted); margin-bottom: 40px;
    font-family: 'SF Mono','Fira Code','Consolas',monospace; font-size: 13px;
  }

  .cert-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 24px;
  }

  .cert-card {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: all .3s;
    display: flex; flex-direction: column;
  }
  .cert-card:hover {
    border-color: var(--purple);
    box-shadow: 0 8px 30px rgba(163,113,247,.15);
    transform: translateY(-2px);
  }

  .cert-img-wrap {
    position: relative; cursor: pointer;
    background: var(--bg2);
    padding: 16px;
    display: flex; justify-content: center;
  }
  .cert-img-wrap img {
    max-width: 100%; max-height: 260px;
    border-radius: 6px;
    border: 2px solid var(--border);
    transition: opacity .2s;
  }
  .cert-img-wrap:hover img { opacity: .85; }
  .cert-img-wrap::after {
    content: '🔍 点击放大';
    position: absolute; bottom: 24px; right: 24px;
    font-size: 12px; color: var(--muted);
    background: rgba(0,0,0,.7); padding: 4px 10px; border-radius: 4px;
    pointer-events: none;
  }

  .cert-body { padding: 18px 20px 20px; flex: 1; display: flex; flex-direction: column; }
  .cert-issuer {
    font-size: 11px; font-weight: 700; color: var(--orange);
    text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 6px;
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
  }
  .cert-name {
    font-size: 16px; font-weight: 600; color: #f0f6fc;
    margin-bottom: 8px; line-height: 1.4;
  }
  .cert-name b { color: var(--purple); }
  .cert-meta {
    font-size: 12px; color: var(--muted);
    margin-top: auto; padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    gap: 8px; flex-wrap: wrap;
  }
  .cert-date { font-family: 'SF Mono','Fira Code','Consolas',monospace; }
  .cert-notes {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--accent); text-decoration: none;
    font-size: 12px; padding: 3px 9px;
    border: 1px solid var(--accent); border-radius: 4px;
    transition: all .2s;
    background: rgba(88,166,255,.06);
  }
  .cert-notes:hover { background: rgba(88,166,255,.15); }
  .cert-tag {
    background: var(--bg2); color: var(--accent);
    font-size: 11px; padding: 2px 8px; border-radius: 3px;
    border: 1px solid var(--border);
  }

  /* Lightbox */
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,.92); justify-content: center; align-items: center;
    cursor: pointer;
  }
  .lightbox.show { display: flex; }
  .lightbox img {
    max-width: 94vw; max-height: 94vh;
    border-radius: 8px; box-shadow: 0 0 80px rgba(163,113,247,.2);
  }

  @media screen and (max-width: 768px) {
    .page { padding: 24px 14px 20px; }
    .cert-grid { grid-template-columns: 1fr; }
    .back-btn { top: 10px; left: 10px; font-size: 12px; padding: 5px 10px; }
    .page-title { font-size: 22px; }
  }
</style>
</head>
<body>
<a class="back-btn" href="/wyatt_hexo/">&larr; 返回博客</a>
<div class="lightbox" id="lb" onclick="this.classList.remove('show')">
  <img id="lb-img" src="" alt="certificate" onclick="event.stopPropagation()">
</div>
<div class="page">
  <h1 class="page-title">📜 证书</h1>
  <p class="page-sub">Certifications</p>

  <div class="cert-grid">

    <!-- 阿里云认证 -->
    <div class="cert-card">
      <div class="cert-img-wrap" onclick="openLightbox('https://cwh6-bucket.oss-cn-shanghai.aliyuncs.com/hexo/ScreenShot_2026-07-09_222644_230.png')">
        <img src="https://cwh6-bucket.oss-cn-shanghai.aliyuncs.com/hexo/ScreenShot_2026-07-09_222644_230.png" alt="阿里云Apsara Clouder认证" loading="lazy">
      </div>
      <div class="cert-body">
        <div class="cert-issuer">Alibaba Cloud Certification</div>
        <div class="cert-name"><b>阿里云Apsara Clouder</b><br>大模型Clouder认证：基于通义灵码实现高效AI编码实践</div>
        <div class="cert-meta">
          <span class="cert-date">2026-07-09</span>
          <span class="cert-tag">AI</span>
          <a class="cert-notes" href="/wyatt_hexo/2026/07/01/%E3%80%90AI%E3%80%91%E5%A4%A7%E6%A8%A1%E5%9E%8BClouder%E8%AE%A4%E8%AF%81-%E5%9F%BA%E4%BA%8E%E9%80%9A%E4%B9%89%E7%81%B5%E7%A0%81%E5%AE%9E%E7%8E%B0%E9%AB%98%E6%95%88-AI-%E7%BC%96%E7%A0%81%E5%AE%9E%E8%B7%B5/" target="_blank">📝 笔记</a>
        </div>
      </div>
    </div>

    <!-- 蓝桥杯 -->
    <div class="cert-card">
      <div class="cert-img-wrap" onclick="openLightbox('https://cwh6-bucket.oss-cn-shanghai.aliyuncs.com/hexo/%E7%9C%81%E8%B5%9B_%E8%BD%AF%E4%BB%B6%E7%B1%BB_JavaC%E7%BB%84_%E4%BA%8C%E7%AD%89%E5%A5%96_%E9%99%88%E4%B8%BA%E6%B1%87_061200120_198845.jpg')">
        <img src="https://cwh6-bucket.oss-cn-shanghai.aliyuncs.com/hexo/%E7%9C%81%E8%B5%9B_%E8%BD%AF%E4%BB%B6%E7%B1%BB_JavaC%E7%BB%84_%E4%BA%8C%E7%AD%89%E5%A5%96_%E9%99%88%E4%B8%BA%E6%B1%87_061200120_198845.jpg" alt="蓝桥杯证书" loading="lazy">
      </div>
      <div class="cert-body">
        <div class="cert-issuer">Lanqiao Cup</div>
        <div class="cert-name"><b>蓝桥杯</b><br>广东省蓝桥杯二等奖</div>
        <div class="cert-meta">
          <span class="cert-date">2021-05-31</span>
          <span class="cert-tag">竞赛</span>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
function openLightbox(src) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lb').classList.add('show');
}
</script>
</body>
</html>
