<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陈为汇 · Wyatt</title>
<link rel="icon" type="image/png" href="/wyatt_hexo/img/tx_circle.png">
<style>
  :root {
    --bg0: #0d1117;
    --bg1: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d2991d;
    --purple: #a371f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: var(--text);
    background: linear-gradient(135deg, rgba(9,12,16,.75) 0%, rgba(13,21,32,.7) 50%, rgba(10,15,22,.75) 100%) fixed, url(/wyatt_hexo/img/lmz_bg.jpg) fixed center/cover no-repeat;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 32px;
    overflow-x: hidden;
  }

  .container {
    width: 100%; max-width: 820px;
  }

  /* Hero */
  .hero {
    text-align: center; margin-bottom: 56px;
    animation: fadeUp .8s ease-out;
  }
  .hero-eyebrow {
    font-size: 10px; letter-spacing: 8px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 20px;
    animation: fadeUp .8s ease-out .05s both;
  }
  .hero h1 {
    font-family: 'Songti SC', 'SimSun', serif;
    font-size: 64px; font-weight: 700; color: #f0f6fc;
    letter-spacing: 8px; line-height: 1.1; margin-bottom: 16px;
    animation: fadeUp .8s ease-out .1s both;
  }
  .hero-line {
    width: 50px; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--purple), var(--orange));
    margin: 0 auto 20px; border-radius: 2px;
    animation: fadeUp .8s ease-out .15s both;
  }
  .hero-sub {
    font-size: 15px; color: var(--muted); letter-spacing: 4px;
    animation: fadeUp .8s ease-out .2s both;
  }

  /* Grid */
  .modules {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  .module-card {
    position: relative;
    background: linear-gradient(160deg, rgba(22,27,34,.8) 0%, rgba(13,17,23,.9) 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 32px 32px;
    text-decoration: none; color: var(--text);
    transition: all .4s cubic-bezier(.25,.8,.25,1);
    overflow: hidden;
    backdrop-filter: blur(12px);
    display: flex; flex-direction: column; gap: 16px;
    min-height: 200px;
    animation: fadeUp .6s ease-out both;
  }
  .module-card:nth-child(1) { animation-delay: .25s; }
  .module-card:nth-child(2) { animation-delay: .30s; }
  .module-card:nth-child(3) { animation-delay: .35s; }
  .module-card:nth-child(4) { animation-delay: .40s; }

  .module-card::before {
    content: '';
    position: absolute; inset: -1px; border-radius: 16px; z-index: -1;
    opacity: 0; transition: opacity .4s;
  }
  .module-card:nth-child(1)::before { background: linear-gradient(135deg, var(--accent), transparent 60%); }
  .module-card:nth-child(2)::before { background: linear-gradient(135deg, var(--purple), transparent 60%); }
  .module-card:nth-child(3)::before { background: linear-gradient(135deg, var(--orange), transparent 60%); }
  .module-card:nth-child(4)::before { background: linear-gradient(135deg, var(--green), transparent 60%); }

  .module-card:hover {
    transform: translateY(-6px);
    border-color: transparent;
  }
  .module-card:hover::before { opacity: 1; }

  .module-card:nth-child(1):hover { box-shadow: 0 20px 60px rgba(88,166,255,.15); }
  .module-card:nth-child(2):hover { box-shadow: 0 20px 60px rgba(163,113,247,.15); }
  .module-card:nth-child(3):hover { box-shadow: 0 20px 60px rgba(210,153,29,.15); }
  .module-card:nth-child(4):hover { box-shadow: 0 20px 60px rgba(63,185,80,.15); }

  .module-num {
    font-family: 'Songti SC', 'SimSun', serif;
    font-size: 56px; font-weight: 700; line-height: 1;
    letter-spacing: -3px; pointer-events: none;
  }
  .module-card:nth-child(1) .module-num { color: rgba(88,166,255,.10); }
  .module-card:nth-child(2) .module-num { color: rgba(163,113,247,.10); }
  .module-card:nth-child(3) .module-num { color: rgba(210,153,29,.10); }
  .module-card:nth-child(4) .module-num { color: rgba(63,185,80,.10); }

  .module-icon { font-size: 30px; line-height: 1; }

  .module-title {
    font-family: 'Songti SC', 'SimSun', serif;
    font-size: 24px; font-weight: 700; color: #f0f6fc;
    letter-spacing: 3px;
  }
  .module-desc {
    font-size: 13px; color: var(--muted); line-height: 1.7;
    flex: 1;
  }

  .module-arrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px;
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
    letter-spacing: 2px; text-transform: uppercase;
    transition: all .3s;
  }
  .module-card:nth-child(1) .module-arrow { color: var(--accent); }
  .module-card:nth-child(2) .module-arrow { color: var(--purple); }
  .module-card:nth-child(3) .module-arrow { color: var(--orange); }
  .module-card:nth-child(4) .module-arrow { color: var(--green); }
  .module-card:hover .module-arrow { gap: 14px; }
  .module-card:hover .module-arrow::after { content: ' →'; opacity: 0; animation: arrowIn .3s ease-out .1s forwards; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes arrowIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Footer */
  .footer {
    text-align: center; margin-top: 56px;
    font-size: 11px; color: rgba(139,148,158,.35);
    letter-spacing: 4px;
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
    animation: fadeUp .8s ease-out .5s both;
  }

  @media screen and (max-width: 768px) {
    body { padding: 20px; align-items: flex-start; }
    .hero { margin-bottom: 40px; padding-top: 40px; }
    .hero h1 { font-size: 40px; letter-spacing: 4px; }
    .hero-eyebrow { letter-spacing: 4px; }
    .hero-sub { font-size: 13px; letter-spacing: 2px; }
    .modules { grid-template-columns: 1fr; gap: 16px; }
    .module-card { padding: 28px 22px 24px; min-height: auto; }
    .module-icon { font-size: 24px; }
    .module-title { font-size: 19px; letter-spacing: 2px; }
    .module-num { font-size: 40px; }
    .footer { margin-top: 40px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="hero">
    <div class="hero-eyebrow">Wyatt's Space</div>
    <h1>陈为汇</h1>
    <div class="hero-line"></div>
    <div class="hero-sub">AI 全栈工程师 · 持续构建中</div>
  </div>

  <div class="modules">

    <a class="module-card" href="/wyatt_hexo/blog/">
      <div class="module-num">01</div>
      <div class="module-icon">📝</div>
      <div class="module-title">博客文章</div>
      <div class="module-desc">技术笔记、踩坑记录、学习心得，随手记录一路成长。</div>
      <div class="module-arrow">进入阅读 →</div>
    </a>

    <a class="module-card" href="/wyatt_hexo/works/">
      <div class="module-num">02</div>
      <div class="module-icon">🛠️</div>
      <div class="module-title">我的作品</div>
      <div class="module-desc">独立开发的项目与产品，每一个都倾注心血。</div>
      <div class="module-arrow">查看作品 →</div>
    </a>

    <a class="module-card" href="/wyatt_hexo/cert/">
      <div class="module-num">03</div>
      <div class="module-icon">📜</div>
      <div class="module-title">我的证书</div>
      <div class="module-desc">认证、竞赛与荣誉，一行行写下的里程碑。</div>
      <div class="module-arrow">查看证书 →</div>
    </a>

    <a class="module-card" href="/wyatt_hexo/about/">
      <div class="module-num">04</div>
      <div class="module-icon">👤</div>
      <div class="module-title">关于作者</div>
      <div class="module-desc">了解我、联系我，也许我们可以一起做点什么。</div>
      <div class="module-arrow">了解更多 →</div>
    </a>

  </div>

  <div class="footer">ENJOY YOUR STAY</div>

</div>
</body>
</html>
