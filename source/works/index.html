---
layout: false
---
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作品 - 陈为汇</title>
<link rel="icon" type="image/png" href="/wyatt_hexo/img/tx_circle.png">
<style>
  :root {
    --bg0: #0d1117;
    --bg1: #161b22;
    --bg2: #21262d;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d2991d;
    --purple: #a371f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: var(--text);
    background: linear-gradient(135deg, rgba(9,12,16,.75) 0%, rgba(13,21,32,.7) 50%, rgba(10,15,22,.75) 100%) fixed, url(/wyatt_hexo/img/lmz_bg.jpg) fixed center/cover no-repeat;
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    position: fixed; top: 16px; left: 16px; z-index: 10;
    color: var(--muted); text-decoration: none;
    font-size: 13px; font-family: 'SF Mono','Fira Code','Consolas',monospace;
    padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px;
    transition: all .2s; background: var(--bg0);
  }
  .back-btn:hover { color: var(--accent); border-color: var(--accent); }

  .page { max-width: 880px; margin: 0 auto; padding: 100px 40px 60px; position: relative; z-index: 1; }

  /* Lightbox */
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,.92); justify-content: center; align-items: center;
    cursor: pointer;
  }
  .lightbox.show { display: flex; }
  .lightbox img {
    max-width: 94vw; max-height: 94vh;
    border-radius: 8px; box-shadow: 0 0 80px rgba(163,113,247,.2);
  }

  /* Hero */
  .hero {
    margin-bottom: 80px; text-align: center;
  }
  .hero-eyebrow {
    font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 16px;
  }
  .hero h1 {
    font-family: 'Songti SC', 'SimSun', serif;
    font-size: 56px; font-weight: 700; color: #f0f6fc;
    letter-spacing: 6px; line-height: 1.2; margin-bottom: 12px;
  }
  .hero-line {
    width: 40px; height: 3px; background: linear-gradient(90deg, var(--accent), var(--purple));
    margin: 0 auto 20px; border-radius: 2px;
  }
  .hero-sub {
    font-size: 14px; color: var(--muted);
    letter-spacing: 3px;
  }

  /* 搜索框 */
  .work-search {
    display: flex; justify-content: center; margin-top: 28px;
  }
  .work-search input {
    width: 100%; max-width: 380px;
    padding: 9px 16px 9px 38px;
    background: var(--bg1); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 13px;
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
    outline: none; transition: all .25s;
  }
  .work-search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88,166,255,.1); }
  .work-search input::placeholder { color: var(--muted); }
  .work-search-wrap { position: relative; max-width: 380px; width: 100%; }
  .work-search-wrap::before {
    content: '🔍'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    font-size: 13px; opacity: .5; pointer-events: none;
  }
  .work-empty {
    text-align: center; padding: 48px 20px; color: var(--muted);
    font-size: 14px; letter-spacing: 1px;
    display: none;
  }

  /* Project list */
  .project-list { display: flex; flex-direction: column; gap: 0; }

  .project-item {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 48px;
    padding: 48px 0;
    border-top: 1px solid var(--border);
    text-decoration: none; color: inherit;
    transition: all .35s;
    align-items: center;
  }
  .project-item:last-child { border-bottom: 1px solid var(--border); }
  .project-item:hover {
    background: rgba(88,166,255,.03);
    margin: 0 -24px; padding-left: 24px; padding-right: 24px;
    border-radius: 10px; border-color: transparent;
    border-top-color: transparent;
  }

  .project-image {
    position: relative; border-radius: 8px; overflow: hidden;
    transition: all .4s;
    aspect-ratio: 4/3;
    display: flex; align-items: center; justify-content: center;
    cursor: zoom-in;
  }
  .project-item:hover .project-image {
    box-shadow: 0 20px 60px rgba(163,113,247,.12);
    transform: translateY(-3px);
  }
  .project-image img {
    width: 100%; height: 100%; object-fit: contain;
    padding: 4px; border-radius: 8px;
  }
  /* Number overlay on image */
  .project-num {
    position: absolute; bottom: 8px; right: 14px;
    font-family: 'Songti SC', 'SimSun', serif;
    font-size: 64px; font-weight: 700; color: rgba(163,113,247,.25);
    line-height: 1; letter-spacing: -2px; pointer-events: none;
  }
  /* Zoom hint */
  .project-image::after {
    content: '🔍 点击放大';
    position: absolute; bottom: 16px; left: 16px;
    font-size: 11px; color: var(--muted); opacity: 0;
    transition: opacity .3s; pointer-events: none;
    background: rgba(0,0,0,.6); padding: 2px 8px; border-radius: 4px;
  }
  .project-image:hover::after { opacity: 1; }

  .project-info { display: flex; flex-direction: column; gap: 12px; }
  .project-name {
    font-family: 'Songti SC', 'SimSun', serif;
    font-size: 28px; font-weight: 700; color: #f0f6fc;
    letter-spacing: 3px;
  }
  .project-name .en {
    display: block; font-family: -apple-system, sans-serif;
    font-size: 13px; color: var(--purple); font-weight: 400;
    letter-spacing: 1px; margin-top: 3px;
  }
  .project-desc {
    font-size: 14px; color: var(--muted); line-height: 1.8;
    max-width: 420px;
  }
  .project-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .project-tag {
    font-size: 11px; letter-spacing: 1px;
    padding: 3px 12px; border-radius: 4px;
    border: 1px solid var(--border); color: var(--muted);
  }
  .project-tag.ai { color: var(--purple); border-color: rgba(163,113,247,.35); background: rgba(163,113,247,.06); }
  .project-tag.fs { color: var(--green); border-color: rgba(63,185,80,.35); background: rgba(63,185,80,.06); }
  .project-tag.rag { color: var(--orange); border-color: rgba(210,153,29,.35); background: rgba(210,153,29,.06); }

  .project-link {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--accent); letter-spacing: 1px;
    margin-top: 6px; font-weight: 500;
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
    transition: gap .3s;
  }
  .project-item:hover .project-link { gap: 14px; color: var(--purple); }
  .project-link .arrow { font-size: 15px; }

  /* Footer */
  .page-footer {
    text-align: center; margin-top: 80px; padding-top: 40px;
    border-top: 1px solid var(--border);
    font-size: 12px; color: var(--muted); letter-spacing: 3px;
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
  }

  @media screen and (max-width: 768px) {
    .page { padding: 80px 18px 40px; }
    .hero { margin-bottom: 48px; }
    .hero h1 { font-size: 36px; letter-spacing: 3px; }
    .project-item {
      grid-template-columns: 1fr; gap: 20px; padding: 32px 0;
    }
    .project-item:hover { margin: 0 -10px; padding-left: 10px; padding-right: 10px; }
    .project-image { aspect-ratio: 16/10; max-height: 200px; order: -1; }
    .project-num { font-size: 42px; }
    .project-name { font-size: 22px; }
    .back-btn { top: 10px; left: 10px; font-size: 12px; padding: 5px 10px; }
  }
</style>
</head>
<body>
<a class="back-btn" href="/wyatt_hexo/">← 返回</a>

<!-- Lightbox -->
<div class="lightbox" id="lb" onclick="this.classList.remove('show')">
  <img id="lb-img" src="" alt="preview" onclick="event.stopPropagation()">
</div>

<div class="page">

  <div class="hero">
    <div class="hero-eyebrow">Selected Works</div>
    <h1>作品集</h1>
    <div class="hero-line"></div>
    <div class="hero-sub">设计 · 开发 · 创造</div>
    <div class="work-search">
      <div class="work-search-wrap">
        <input type="text" id="workSearch" placeholder="搜索作品名称或简介..." oninput="filterWorks()">
      </div>
    </div>
  </div>

  <div class="work-empty" id="workEmpty">没有匹配的作品</div>

  <div class="project-list">

    <!-- 暖心马头 -->
    <a class="project-item" href="/wyatt_hexo/works/warm-pony.html">
      <div class="project-image" onclick="event.preventDefault(); event.stopPropagation(); openLightbox('https://cwh6-bucket.oss-cn-shanghai.aliyuncs.com/hexo/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260712233359_267_25.png')">
        <img src="https://cwh6-bucket.oss-cn-shanghai.aliyuncs.com/hexo/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260712233359_267_25.png" alt="暖心马头" loading="lazy">
        <div class="project-num">01</div>
      </div>
      <div class="project-info">
        <div class="project-name">
          暖心马头
          <span class="en">Warm Pony</span>
        </div>
        <div class="project-desc">
          一只戴着马头头套的治愈系AI虚拟伙伴。融合角色养成与智能对话，打开网页就能聊天互动——它会走动、有表情、记得你的每一次倾诉，越聊越懂你。
        </div>
        <div class="project-tags">
          <span class="project-tag ai">AI 大模型</span>
          <span class="project-tag fs">全栈开发</span>
          <span class="project-tag rag">RAG</span>
          <span class="project-tag">虚拟伙伴</span>
        </div>
        <div class="project-link">
          查看详情 <span class="arrow">→</span>
        </div>
      </div>
    </a>

  </div>

  <div class="page-footer">MORE COMING SOON</div>

</div>

<script>
function openLightbox(src) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lb').classList.add('show');
}

function filterWorks() {
  var q = document.getElementById('workSearch').value.trim().toLowerCase();
  var items = document.querySelectorAll('.project-item');
  var visible = 0;

  items.forEach(function(item) {
    var text = (item.textContent || '').toLowerCase();
    var match = !q || text.indexOf(q) !== -1;
    item.style.display = match ? '' : 'none';
    if (match) visible++;
  });

  document.getElementById('workEmpty').style.display = visible === 0 ? 'block' : 'none';
}
</script>
</body>
</html>
