<style>
  :root {
    --bg0: #0d1117;
    --bg1: #161b22;
    --bg2: #21262d;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d2991d;
    --red: #f85149;
    --purple: #a371f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: var(--text);
    background: #090c10;
    font-size: 14px;
    line-height: 1.7;
  }
  .page {
    max-width: 840px; margin: 36px auto;
    background: var(--bg0);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 48px 56px 44px;
  }

  /* Back button */
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    position: absolute; top: 16px; left: 16px;
    color: var(--muted); text-decoration: none;
    font-size: 13px; font-family: 'SF Mono','Fira Code','Consolas',monospace;
    padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px;
    transition: all .2s;
  }
  .back-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* Header */
  .header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 28px; padding-bottom: 22px;
    border-bottom: 1px solid var(--border);
    gap: 32px;
  }
  .header .left-col { display: flex; align-items: flex-start; gap: 22px; }
  .header h1 { font-size: 26px; font-weight: 600; color: #f0f6fc; letter-spacing: 2px; }
  .header .sub { font-size: 14px; color: var(--accent); margin-top: 4px; font-weight: 500; font-family: 'SF Mono','Fira Code','Consolas',monospace; }
  .header .info { text-align: right; font-size: 13px; color: var(--muted); line-height: 2; flex-shrink: 0; }
  .header .info a { color: var(--accent); text-decoration: none; }

  /* Avatar */
  .avatar-wrap {
    flex-shrink: 0; cursor: pointer; position: relative;
    padding: 3px; background: var(--border); border-radius: 5px;
    transition: opacity .2s;
  }
  .avatar-wrap:hover { opacity: .85; }
  .avatar-wrap .avatar {
    display: block; width: 82px; height: 105px; object-fit: cover; border-radius: 3px;
  }
  .avatar-wrap::after {
    content: '🔍'; position: absolute; bottom: 4px; right: 4px;
    font-size: 10px; opacity: .7; pointer-events: none;
  }

  /* Lightbox */
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,.88); justify-content: center; align-items: center;
    cursor: pointer;
  }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 6px; box-shadow: 0 0 60px rgba(0,0,0,.5); }

  /* Section */
  .section { margin-bottom: 26px; }
  .section-title {
    font-size: 14px; font-weight: 600; color: var(--accent);
    padding-bottom: 6px; margin-bottom: 14px;
    border-bottom: 1px solid #21262d;
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
    letter-spacing: 1px;
  }
  .section-title .dot { color: var(--green); margin-right: 6px; }

  /* Intention */
  .intention { display: flex; gap: 36px; font-size: 14px; }
  .intention .label { color: var(--muted); }

  /* Tags */
  .skill-cat { margin-bottom: 10px; }
  .skill-cat .cat-name { font-size: 12px; font-weight: 600; margin-bottom: 5px; color: var(--muted); font-family: 'SF Mono','Fira Code','Consolas',monospace; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    background: var(--bg2); color: var(--text); padding: 2px 10px;
    border-radius: 4px; font-size: 12px; border: 1px solid var(--border);
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
  }
  .tag:hover { border-color: var(--accent); color: var(--accent); }

  /* Timeline */
  .tl { margin-bottom: 14px; padding-left: 16px; border-left: 1px solid var(--border); position: relative; }
  .tl::before { content: '>'; position: absolute; left: -7px; top: 1px; font-size: 10px; color: var(--green); font-family: 'SF Mono','Fira Code','Consolas',monospace; }
  .tl-hd { display: flex; justify-content: space-between; flex-wrap: wrap; }
  .tl-hd .l { font-weight: 600; color: #f0f6fc; }
  .tl-hd .r { font-size: 12px; color: var(--muted); font-family: 'SF Mono','Fira Code','Consolas',monospace; }
  .tl-sub { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .tl-detail { font-size: 13px; color: var(--text); }
  .tl-detail li { margin-bottom: 2px; list-style: none; padding-left: 14px; }
  .tl-detail li::before { content: '-'; color: var(--muted); margin-right: 6px; }

  /* Project */
  .pj { margin-bottom: 16px; padding: 14px 16px; background: var(--bg1); border-radius: 6px; border: 1px solid var(--border); }
  .pj-hd { display: flex; justify-content: space-between; flex-wrap: wrap; margin-bottom: 5px; }
  .pj-hd .n { font-weight: 600; font-size: 14px; color: var(--orange); }
  .pj-hd .d { font-size: 12px; color: var(--muted); font-family: 'SF Mono','Fira Code','Consolas',monospace; }
  .pj-desc { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .pj-detail { font-size: 13px; color: var(--text); }
  .pj-detail li { margin-bottom: 2px; list-style: none; padding-left: 14px; }
  .pj-detail li::before { content: '▸'; color: var(--accent); margin-right: 6px; font-size: 10px; }

  /* Self eval */
  .eval { font-size: 13px; }
  .eval li { margin-bottom: 5px; list-style: none; padding-left: 14px; }
  .eval li::before { content: '>'; color: var(--green); margin-right: 6px; font-family: 'SF Mono','Fira Code','Consolas',monospace; }
  .eval li strong { color: #f0f6fc; }

  /* Education */
  .edu-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .edu-row .school { font-weight: 600; color: #f0f6fc; }
  .edu-row .date { font-size: 12px; color: var(--muted); font-family: 'SF Mono','Fira Code','Consolas',monospace; }
  .edu-detail { font-size: 13px; color: var(--muted); }

  .footer { text-align: center; font-size: 11px; color: #484f58; margin-top: 32px; padding-top: 18px; border-top: 1px solid #21262d; font-family: 'SF Mono','Fira Code','Consolas',monospace; }

  @media print {
    body { background: #fff; color: #222; }
    .page { border: none; background: #fff; margin: 0; padding: 36px 44px 28px; max-width: 100%; }
    .header h1, .tl-hd .l, .edu-row .school, .eval li strong { color: #111; }
    .tag { background: #f0f0f0; color: #222; border: 1px solid #ccc; }
    .pj { background: #f9f9f9; border: 1px solid #ddd; }
    .avatar-wrap { padding: 1px; background: #ddd; }
    .lightbox { display: none !important; }
  }

  @media screen and (max-width: 768px) {
    body { font-size: 13px; }
    .page { margin: 0; border: none; border-radius: 0; padding: 32px 16px 28px; }
    .header { flex-direction: column; align-items: flex-start; gap: 18px; }
    .header .left-col { gap: 14px; align-items: center; }
    .avatar-wrap .avatar { width: 60px; height: 78px; }
    .header h1 { font-size: 22px; }
    .header .info { text-align: left; }
    .back-btn { top: 10px; left: 10px; font-size: 12px; padding: 5px 10px; }
  }
</style>
</head>

    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
})(resume);
</script>
